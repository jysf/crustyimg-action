name: self-test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Exercises the full lint wrapper (install → JSON → annotations → exit) on all
  # three OSes against the released crustyimg (v0.4.0, the first release that
  # ships `lint`).
  lint-wrapper:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Lint the GPS-leak fixture (must annotate + fail)
        id: lint
        continue-on-error: true
        uses: ./
        with:
          version: v0.4.0
          paths: test-assets

      - name: Assert the lint failed (findings → non-zero)
        shell: bash
        run: |
          if [ "${{ steps.lint.outcome }}" != "failure" ]; then
            echo "expected the GPS-leak lint to fail, got '${{ steps.lint.outcome }}'"
            exit 1
          fi
          echo "GPS-leak lint failed as expected ✅"

      - name: fail-level=never reports but stays green
        uses: ./
        with:
          version: v0.4.0
          paths: test-assets
          fail-level: never

  # Exercises the optimize mode (also proves the setup-crustyimg delegation).
  optimize-mode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Optimize via the action
        uses: ./
        with:
          mode: optimize
          version: v0.4.0
          paths: test-assets/clean.png
          args: -o out.png
      - name: Optimized file exists
        shell: bash
        run: test -f out.png && echo "optimize produced $(wc -c < out.png) bytes"
